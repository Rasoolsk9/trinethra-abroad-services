name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, unit tests, E2E, Lighthouse
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npx playwright test
        env:
          CI: true

      - name: Lighthouse CI
        run: |
          set -e
          CHROME_PATH="$(find "$HOME/.cache/ms-playwright" -name chrome -type f 2>/dev/null | head -1 || true)"
          if [ -z "$CHROME_PATH" ]; then
            echo "Playwright Chrome missing; re-installing"
            npx playwright install chromium
            CHROME_PATH="$(find "$HOME/.cache/ms-playwright" -name chrome -type f 2>/dev/null | head -1)"
          fi
          if [ -z "$CHROME_PATH" ]; then
            echo "Could not find Chromium for Lighthouse" >&2
            exit 1
          fi
          export CHROME_PATH
          echo "CHROME_PATH=$CHROME_PATH"
          npm run lighthouse:ci

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
